<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VACUM Intro Background</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

/* 인트로 배경만 */
.intro {
    width: 100%;
    height: 100vh;
    min-height: 100vh;
    background-image: url('https://vw-vacum.github.io/vacum-site/vacum_background_v1.png');
    background-position: center center;
    background-repeat: no-repeat;
    background-size: cover;
    position: relative;
    overflow: hidden;
}

/* 어두운 필름 느낌만 얹기 */
.intro::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.18);
}

/* 데스크탑 큰 화면에서 중심축 조금 보정 */
@media (min-width: 1400px) {
    .intro {
        background-position: center center;
    }
}

/* 모바일 */
@media (max-width: 768px) {
    .intro {
        background-position: center center;
        background-size: cover;
    }
}
</style>
</head>
<body>

<section class="intro"></section>

</body>
</html>
