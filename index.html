<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VACUM</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
    background: #000;
}

.intro {
    position: relative;
    width: 100%;
    min-height: 100vh;
    background-image: url('https://vw-vacum.github.io/vacum-site/vacum_background_v1.png');
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.intro::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
}

.content {
    position: relative;
    z-index: 1;
    color: white;
    text-align: center;
    padding: 20px;
}

.logo {
    font-size: 64px;
    letter-spacing: 10px;
    font-weight: 300;
}

.desc {
    margin-top: 20px;
    font-size: 16px;
    letter-spacing: 2px;
    opacity: 0.85;
    line-height: 1.7;
}

.enter {
    margin-top: 40px;
    padding: 12px 30px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
    transition: 0.3s ease;
}

.enter:hover {
    background: white;
    color: black;
}
</style>
</head>

<body>

<div class="intro">
    <div class="content">
        <div class="logo">VACUM</div>
        <div class="desc">
            Built on the remains of a collapsed world.<br>
            Survival is not a choice. It is structure.
        </div>
        <button class="enter">ENTER</button>
    </div>
</div>

</body>
</html>
