<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VACUM</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    background: #000;
}

/* 배경 */
.intro {
    width: 100%;
    height: 100vh;
    background: url('vacum_background_v1.png') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 살짝 어둡게 */
.intro::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.25);
}

/* 로고 */
.logo {
    position: relative;
    z-index: 1;
    width: 220px;
    cursor: pointer;
    transition: 0.3s;
}

.logo:hover {
    transform: scale(1.05);
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="intro">
    <a href="main.html">
        <img src="logo002.png" class="logo">
    </a>
</div>

</body>
</html>
