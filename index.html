<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VACUM - Intro</title>
    <style>
        /* 기본 여백 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Pretendard', sans-serif;
            background-color: #000; /* 이미지 로딩 전 기본 배경색 */
            overflow: hidden; /* 인트로에서 스크롤 방지 */
        }

        /* 배경 설정 */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('vacum_background_v1.png'); /* 이미지 파일명 */
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover; /* 화면을 꽉 채우되 비율 유지 */
            z-index: -1;
            filter: brightness(0.8); /* 배경을 약간 어둡게 하여 텍스트 가독성 확보 */
        }

        /* 중앙 콘텐츠 영역 */
        .content {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 0.5rem;
            font-weight: 300;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.8;
            letter-spacing: 0.1rem;
        }

        /* 모바일 대응 (반응형) */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>

    <div class="content">
        <h1>VACUM</h1>
        <p>Entering the atmosphere...</p>
    </div>

</body>
</html>
