<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VACUM Main</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Segoe UI", Arial, sans-serif;
      background: #fff;
      color: #000;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      width: 100%;
      display: block;
    }

    .site-wrap {
      width: 100%;
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid #e9e9e9;
      backdrop-filter: blur(8px);
    }

    .topbar-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    /* 🔥 로고 수정 */
    .brand img {
      height: 30px;
      width: auto;
      display: block;
    }

    .menu {
      display: flex;
      gap: 32px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu a {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      color: #000;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .menu a:hover {
      opacity: 0.55;
    }

    .mobile-menu-btn {
      display: none;
      border: 0;
      background: transparent;
      font-size: 1.5rem;
      cursor: pointer;
      color: #000;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 34px 24px 80px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.35fr 0.9fr;
      gap: 28px;
      margin-bottom: 54px;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      background: #f5f5f5;
      min-height: 640px;
    }

    .hero-card img {
      height: 100%;
      object-fit: cover;
    }

    .hero-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 34px;
      background: linear-gradient(to top, rgba(0,0,0,0.68), rgba(0,0,0,0));
      color: #fff;
    }

    .eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .hero-title {
      font-size: clamp(2rem, 4vw, 4.25rem);
      line-height: 0.98;
      font-weight: 700;
    }

    /* 모바일 */
    @media (max-width: 768px) {

      .brand img {
        height: 28px;
      }

      .mobile-menu-btn {
        display: block;
      }

      .menu {
        width: 100%;
        display: none;
        flex-direction: column;
        gap: 14px;
        padding-top: 12px;
      }

      .menu.open {
        display: flex;
      }

      .container {
        padding: 22px 18px 60px;
      }

      .hero-card {
        min-height: 460px;
      }
    }
  </style>
</head>

<body>
  <div class="site-wrap">

    <header class="topbar">
      <div class="topbar-inner">

        <!-- 🔥 로고 적용 -->
        <a href="#" class="brand">
          <img src="vacumlogo01.png" alt="VACUM Logo">
        </a>

        <button class="mobile-menu-btn" onclick="toggleMenu()">☰</button>

        <nav class="menu" id="mobileMenu">
          <a href="#">World</a>
          <a href="#">Editorial</a>
          <a href="#">Archive</a>
          <a href="#">Goods</a>
          <a href="#">Journal</a>
          <a href="#">About</a>
        </nav>

      </div>
    </header>

    <main class="container">
      <section class="hero-grid">
        <article class="hero-card">
          <img src="intro0001.png">
          <div class="hero-overlay">
            <div class="eyebrow">Main Story</div>
            <h1 class="hero-title">멸망 이후, 남겨진 구조 위에 세워진 세계</h1>
          </div>
        </article>
      </section>
    </main>

  </div>

  <script>
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
    }
  </script>

</body>
</html>
